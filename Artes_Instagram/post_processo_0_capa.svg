<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#050510"/>
  
  <defs>
    <pattern id="processGrid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00D1FF" stroke-width="1" stroke-opacity="0.1"/>
    </pattern>
    <filter id="cyanGlowCover" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#processGrid)"/>

  <!-- Brand Label -->
  <text x="540" y="120" text-anchor="middle" fill="#00D1FF" fill-opacity="0.6" font-family="Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="6">CRIATIVIDADE WEB // METODOLOGIA</text>

  <!-- Main Headline -->
  <text x="540" y="380" text-anchor="middle" fill="#FFF" font-family="Arial, sans-serif" font-size="72" font-weight="900" leading="1.1">
    <tspan x="540" dy="0">COMO CONSTRUÍMOS</tspan>
    <tspan x="540" dy="100">O SEU <tspan fill="#00D1FF" filter="url(#cyanGlowCover)">SUCESSO</tspan></tspan>
    <tspan x="540" dy="100">DIGITAL</tspan>
  </text>

  <!-- Subtitle -->
  <text x="540" y="750" text-anchor="middle" fill="#888" font-family="Arial, sans-serif" font-size="36" font-weight="500">
    <tspan x="540" dy="0">Conheça o nosso fluxo de elite</tspan>
    <tspan x="540" dy="55">em 5 etapas fundamentais.</tspan>
  </text>

  <!-- Visual Element: Step Indicator -->
  <g transform="translate(240, 950)">
    <circle cx="0" cy="0" r="10" fill="#00D1FF" filter="url(#cyanGlowCover)"/>
    <line x1="10" y1="0" x2="140" y2="0" stroke="#00D1FF" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="150" cy="0" r="10" fill="#00D1FF" fill-opacity="0.3"/>
    <line x1="160" y1="0" x2="290" y2="0" stroke="#00D1FF" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="300" cy="0" r="10" fill="#00D1FF" fill-opacity="0.3"/>
    <line x1="310" y1="0" x2="440" y2="0" stroke="#00D1FF" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="450" cy="0" r="10" fill="#00D1FF" fill-opacity="0.3"/>
    <line x1="460" y1="0" x2="590" y2="0" stroke="#00D1FF" stroke-width="2" stroke-opacity="0.3"/>
    <circle cx="600" cy="0" r="10" fill="#00D1FF" fill-opacity="0.3"/>
  </g>

  <!-- Footer Action -->
  <rect x="0" y="1250" width="1080" height="100" fill="#00D1FF" fill-opacity="0.1"/>
  <text x="540" y="1310" text-anchor="middle" fill="#00D1FF" font-family="Arial, sans-serif" font-size="30" font-weight="900" letter-spacing="4">ARRASTE PARA DESCOBRIR »</text>

</svg>
