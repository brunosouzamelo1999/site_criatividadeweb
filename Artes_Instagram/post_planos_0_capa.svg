<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0A0A0A"/>
  
  <defs>
    <filter id="blueGlowPlan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Abstract Tech Circles -->
  <circle cx="1080" cy="0" r="400" fill="#00D1FF" fill-opacity="0.05" filter="url(#blueGlowPlan)"/>
  <circle cx="0" cy="1350" r="400" fill="#00D1FF" fill-opacity="0.05" filter="url(#blueGlowPlan)"/>

  <!-- Brand Label -->
  <text x="540" y="120" text-anchor="middle" fill="#00D1FF" fill-opacity="0.6" font-family="Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="6">CRIATIVIDADE WEB // INVESTIMENTO</text>

  <!-- Main Headline -->
  <text x="540" y="420" text-anchor="middle" fill="#FFF" font-family="Arial, sans-serif" font-size="70" font-weight="900" leading="1.1">
    <tspan x="540" dy="0" fill="#00D1FF" filter="url(#blueGlowPlan)">PLANOS DE ELITE</tspan>
    <tspan x="540" dy="90" font-size="45">O NÍVEL IDEAL PARA O</tspan>
    <tspan x="540" dy="65" font-size="45">SEU NEGÓCIO</tspan>
  </text>

  <!-- Subtitle -->
  <text x="540" y="750" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="34" font-weight="500">
    <tspan x="540" dy="0">Do essencial ao extraordinário,</tspan>
    <tspan x="540" dy="55">temos a solução que você busca.</tspan>
  </text>

  <!-- Visual Icon: Tiers/Growth -->
  <g transform="translate(540, 1000)">
    <rect x="-100" y="20" width="60" height="40" fill="#00D1FF" fill-opacity="0.2"/>
    <rect x="-30" y="-10" width="60" height="70" fill="#00D1FF" fill-opacity="0.5"/>
    <rect x="40" y="-40" width="60" height="100" fill="#00D1FF" filter="url(#blueGlowPlan)"/>
  </g>

  <!-- Footer Action -->
  <rect x="0" y="1250" width="1080" height="100" fill="#00D1FF" fill-opacity="0.1"/>
  <text x="540" y="1310" text-anchor="middle" fill="#00D1FF" font-family="Arial, sans-serif" font-size="30" font-weight="900" letter-spacing="4">ESCOLHA SEU PLANO »</text>

</svg>
