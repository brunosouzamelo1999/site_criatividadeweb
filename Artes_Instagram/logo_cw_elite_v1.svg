<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Glow Filters -->
    <filter id="pinkGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="yellowGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Gradients -->
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2E63" />
      <stop offset="100%" stop-color="#FF00A8" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD60A" />
      <stop offset="100%" stop-color="#CCFF00" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="#0A0A1A"/>

  <g transform="translate(380, 180)">
    <!-- Letter C (Pink Neon) -->
    <path d="M0,-80 A80,80 0 1,0 0,80" 
          stroke="url(#pinkGrad)" 
          stroke-width="20" 
          stroke-linecap="round" 
          filter="url(#pinkGlow)"
          fill="none"/>
    
    <!-- Letter W (Yellow Neon) - Interlocked -->
    <path d="M-20,-10 L10,80 L55,-10 L100,80 L140,-80" 
          stroke="url(#yellowGrad)" 
          stroke-width="20" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#yellowGlow)"
          fill="none"/>
          
    <!-- Core highlights -->
    <path d="M0,-80 A80,80 0 1,0 0,80" 
          stroke="#FFF" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round" fill="none"/>
    <path d="M-20,-10 L10,80 L55,-10 L100,80 L140,-80" 
          stroke="#FFF" stroke-width="4" stroke-opacity="0.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Text Label -->
  <text x="400" y="330" text-anchor="middle" fill="#FFF" font-family="Arial, sans-serif" font-size="44" font-weight="900" letter-spacing="4">
    CRIATIVIDADE <tspan fill="#FFD60A">WEB</tspan>
  </text>
  
  <text x="400" y="370" text-anchor="middle" fill="#FFF" fill-opacity="0.4" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="10">
    ENGENHARIA DE SOFTWARE
  </text>

</svg>
