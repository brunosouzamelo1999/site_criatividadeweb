<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1350" fill="#0A0A0A"/>
  
  <defs>
    <filter id="greenGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="20" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Shield Pattern -->
  <path d="M540 200 L840 300 V600 C840 850 540 1050 540 1050 C540 1050 240 850 240 600 V300 L540 200Z" stroke="#22C55E" stroke-width="2" stroke-opacity="0.1" fill="none"/>

  <!-- Brand Label -->
  <text x="540" y="120" text-anchor="middle" fill="#22C55E" fill-opacity="0.6" font-family="Arial, sans-serif" font-size="24" font-weight="900" letter-spacing="6">CRIATIVIDADE WEB // SEGURANÇA</text>

  <!-- Main Headline -->
  <text x="540" y="420" text-anchor="middle" fill="#FFF" font-family="Arial, sans-serif" font-size="80" font-weight="900" leading="1.1">
    <tspan x="540" dy="0" font-size="65" fill="#22C55E" filter="url(#greenGlow)">PLANO DE MANUTENÇÃO</tspan>
    <tspan x="540" dy="80" font-size="38">SEU SITE SEMPRE RÁPIDO &amp; PROTEGIDO</tspan>
  </text>

  <!-- Subtitle -->
  <text x="540" y="750" text-anchor="middle" fill="#999" font-family="Arial, sans-serif" font-size="36" font-weight="500">
    <tspan x="540" dy="0">O seguro digital definitivo para</tspan>
    <tspan x="540" dy="55">manter o seu negócio no topo.</tspan>
  </text>

  <!-- Visual Icon: Shield/Lock -->
  <g transform="translate(540, 1000)">
    <circle cx="0" cy="0" r="80" fill="#22C55E" fill-opacity="0.1"/>
    <path d="M-20 -10 V20 H20 V-10 H-20 M-10 -10 V-20 C-10 -25 0 -30 10 -20 V-10" stroke="#22C55E" stroke-width="4" fill="none"/>
  </g>

  <!-- Footer Action -->
  <rect x="0" y="1250" width="1080" height="100" fill="#22C55E" fill-opacity="0.1"/>
  <text x="540" y="1310" text-anchor="middle" fill="#22C55E" font-family="Arial, sans-serif" font-size="30" font-weight="900" letter-spacing="4">CONHEÇA NOSSOS PLANOS »</text>

</svg>
